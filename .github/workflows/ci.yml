name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  reproduce:
    name: Reproduce (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install maintained environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install --no-deps -e .
      - name: Run frozen reproduction contract
        run: ./reproduce.sh

  package:
    name: Build and import wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel --no-deps --wheel-dir dist .
      - name: Install wheel in an isolated environment
        run: |
          python -m venv /tmp/cell-state-reachability-wheel
          /tmp/cell-state-reachability-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/cell-state-reachability-wheel/bin/python -c \
            "import combicone, effect_dictionary, library_coverage, reachability, validation"

  tutorial:
    name: Execute tutorial from a clean checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tutorial environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[tutorial]"
      - name: Execute notebook top to bottom
        run: |
          mkdir -p /tmp/cell-state-reachability-notebook
          python -m jupyter nbconvert \
            --execute \
            --to notebook \
            --output-dir /tmp/cell-state-reachability-notebook \
            tutorial/tutorial.ipynb
          python - <<'PY'
          import nbformat

          committed = nbformat.read("tutorial/tutorial.ipynb", as_version=4)
          executed = nbformat.read(
              "/tmp/cell-state-reachability-notebook/tutorial.ipynb", as_version=4
          )
          if len(committed.cells) != len(executed.cells):
              raise SystemExit("executed tutorial cell count differs")
          for index, (expected, observed) in enumerate(zip(committed.cells, executed.cells)):
              if expected.cell_type != observed.cell_type or expected.source != observed.source:
                  raise SystemExit(f"executed tutorial cell {index} source differs")
              if expected.cell_type == "code" and (
                  expected.execution_count != observed.execution_count
                  or expected.outputs != observed.outputs
              ):
                  raise SystemExit(f"committed tutorial output {index} is stale")
          print("committed tutorial outputs match clean execution")
          PY
      - name: Execute the combinatorial-triage tutorial top to bottom
        run: |
          python -m jupyter nbconvert \
            --execute \
            --to notebook \
            --output-dir /tmp/cell-state-reachability-notebook \
            tutorial/tutorial_combicone.ipynb
          python - <<'PY'
          import nbformat

          committed = nbformat.read("tutorial/tutorial_combicone.ipynb", as_version=4)
          executed = nbformat.read(
              "/tmp/cell-state-reachability-notebook/tutorial_combicone.ipynb", as_version=4
          )
          if len(committed.cells) != len(executed.cells):
              raise SystemExit("executed combicone tutorial cell count differs")
          for index, (expected, observed) in enumerate(zip(committed.cells, executed.cells)):
              if expected.cell_type != observed.cell_type or expected.source != observed.source:
                  raise SystemExit(f"executed combicone tutorial cell {index} source differs")
              # The notebook's own assert cell is the numerical gate: nbconvert --execute
              # fails this job if any cell raises. We check clean execution and source
              # identity here rather than a byte-identical output match.
              if observed.cell_type == "code":
                  for output in observed.get("outputs", []):
                      if output.get("output_type") == "error":
                          raise SystemExit(
                              f"combicone tutorial cell {index} raised on clean execution"
                          )
          print("combicone tutorial executes top to bottom with no errors")
          PY

  cache-builder-smoke:
    name: Synthetic cache reconstruction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install external-data test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,external]"
      - name: Exercise external-data contracts on synthetic fixtures
        run: >-
          python -m pytest -q
          tests/test_cache_reconstruction.py
          tests/test_guide_pair_transfer.py
